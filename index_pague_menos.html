<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pague Menos — Disponibilidade de Veículos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #0B1C3D;
    color: #E8EEFF;
    min-height: 100vh;
    padding: 24px 32px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #F5C842;
    background: rgba(245,200,66,0.12);
    padding: 5px 12px;
    border-radius: 4px;
  }

  .summary {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .sum-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 16px 32px;
    text-align: center;
    min-width: 140px;
  }

  .sum-card .val {
    font-size: 28px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .sum-card .lbl {
    font-size: 12px;
    color: #7A90C4;
    margin-top: 4px;
  }

  .sum-card.maint .val { color: #F97B7B; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .card {
    background: #112145;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: rgba(255,255,255,0.2); }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cd-name {
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .cd-code {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #F5C842;
    background: rgba(245,200,66,0.12);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .stat {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .stat .v {
    font-size: 20px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .stat .l {
    font-size: 10px;
    color: #7A90C4;
    margin-top: 2px;
  }

  .backup-row { margin-bottom: 14px; }

  .backup-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #7A90C4;
    margin-bottom: 5px;
  }

  .backup-bar {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
  }

  .backup-fill {
    height: 100%;
    border-radius: 3px;
    background: #3EC99E;
    transition: width 0.3s, background 0.3s;
  }

  .maint-box {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 12px;
  }

  .maint-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .maint-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #7A90C4;
  }

  .maint-count {
    font-size: 12px;
    font-weight: 600;
    color: #F97B7B;
    background: rgba(249,123,123,0.12);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .maint-count.zero {
    color: #3EC99E;
    background: rgba(62,201,158,0.12);
  }

  .maint-view {
    font-size: 11.5px;
    color: #A0B4D8;
    line-height: 1.9;
    min-height: 20px;
  }

  .maint-view .none {
    color: #4A6190;
    font-style: italic;
  }

  .maint-view .veh {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .veh-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #F97B7B;
    flex-shrink: 0;
  }

  .edit-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: #7A90C4;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .edit-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: #FFFFFF;
  }

  .maint-edit { display: none; margin-top: 6px; }

  .maint-edit textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 7px;
    color: #E8EEFF;
    font-size: 11.5px;
    font-family: inherit;
    padding: 8px 10px;
    resize: vertical;
    min-height: 72px;
    line-height: 1.7;
    outline: none;
  }

  .maint-edit textarea:focus { border-color: rgba(245,200,66,0.5); }
  .maint-edit textarea::placeholder { color: #4A6190; }

  .save-btn {
    margin-top: 6px;
    background: rgba(245,200,66,0.15);
    border: 1px solid rgba(245,200,66,0.3);
    color: #F5C842;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .save-btn:hover { background: rgba(245,200,66,0.25); }

  .cancel-btn {
    margin-top: 6px;
    margin-left: 6px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: #7A90C4;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .cancel-btn:hover { color: #FFFFFF; }

  footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: #3A5070;
  }

  .nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #A0B4D8;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 8px;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-btn.active { background: rgba(245,200,66,0.15); border-color: rgba(245,200,66,0.4); color: #F5C842; }
  .page { display: none; }
  .page.visible { display: block; }
  .routes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .route-card { background: #112145; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 18px; }
  .route-card-title { font-size: 14px; font-weight: 600; color: #FFFFFF; margin-bottom: 4px; }
  .route-card-sub { font-size: 11px; color: #7A90C4; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .route-item { display: flex; align-items: baseline; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
  .route-item:last-child { border-bottom: none; }
  .route-name { color: #C8D8F0; font-weight: 500; }
  .route-detail { font-size: 11px; color: #4A6190; text-align: right; }
</style>
</head>

async function dbLoad() {
  try {
    cds.forEach(c => c.maint = []); // zera antes de recarregar (evita acumular no refresh)
    const r = await fetch(SUPA_URL + '/rest/v1/manutencao?select=*', {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const rows = await r.json();
    if (!Array.isArray(rows)) return;
    rows.forEach(row => {
      const cd = cds.find(c => c.code === row.cd_code);
      if (cd) cd.maint = row.veiculos || [];
    });
  } catch(e) { console.warn('Erro ao carregar:', e); }
}

async function dbSave(code, veiculos) {
  try {
    await fetch(SUPA_URL + '/rest/v1/manutencao?cd_code=eq.' + encodeURIComponent(code), {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ veiculos: veiculos, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.warn('Erro ao salvar:', e); }
}

// ===== INTEGRACAO COM O PAINEL DE GESTAO DA FROTA (L'AUTO) =====
// Le os veiculos Pague Menos coleta/entrega que estao em manutencao no painel principal.
const LAUTO_URL = 'https://tvpqdpqmainlhenxpsap.supabase.co';
const LAUTO_KEY = 'sb_publishable_7V2LryjNG-2VZnqy4QyVFg_cJeHqm38';
// Mapeia a base (centro de custo) do banco L'auto para o CD deste painel.
// FEC entra junto no CD 04 (SSA), conforme combinado.
const BASE_TO_CD = {
  'FOR':'FOR CD', 'GYN':'GYN', 'REC':'REC',
  'SSA':'SSA', 'FEC':'SSA',
  'BEL':'BEL', 'SLZ':'SLZ', 'AQZ':'AQZ', 'JPA':'JPA'
};
async function loadFromLauto() {
  try {
    // so veiculos PAGUE MENOS, coleta/entrega, que NAO estao OK (em manutencao)
    const q = LAUTO_URL + '/rest/v1/veiculos?select=placa,perfil,base,tipo_rota,status,projeto'
      + '&projeto=eq.PAGUE%20MENOS'
      + '&tipo_rota=eq.COLETA/ENTREGA'
      + '&status=neq.OK';
    const r = await fetch(q, { headers: { 'apikey': LAUTO_KEY, 'Authorization': 'Bearer ' + LAUTO_KEY } });
    const rows = await r.json();
    if (!Array.isArray(rows)) return;
    rows.forEach(row => {
      const cdCode = BASE_TO_CD[row.base];
      if (!cdCode) return; // base sem card neste painel: ignora
      const cd = cds.find(c => c.code === cdCode);
      if (!cd) return;
      const label = row.placa + (row.perfil && row.perfil !== '-' ? ' (' + row.perfil + ')' : '');
      // evita duplicar se a mesma placa ja estiver na lista
      if (!cd.maint.some(v => v.split(' ')[0] === row.placa)) {
        cd.maint.push(label);
      }
    });
  } catch(e) { console.warn('Erro ao ler painel L auto:', e); }
}

function barColor(pct) {
  if (pct >= 70) return '#3EC99E';
  if (pct >= 50) return '#F5A623';
  return '#F97B7B';
}

function backupDisp(cd) { return cd.backup - cd.maint.length; }

function dispPct(cd) {
  if (cd.backup === 0) return 0;
  return Math.min(100, Math.round(Math.max(0, backupDisp(cd)) / cd.backup * 100));
}

function vehsHtml(maint) {
  if (!maint.length) return '<span class="none">Nenhum veículo em manutenção</span>';
  return maint.map(v => '<div class="veh"><span class="veh-dot"></span>' + v + '</div>').join('');
}

function renderSummary() {
  const totalNec = cds.reduce((s,c) => s + c.necessarios, 0);
  const totalBackup = cds.reduce((s,c) => s + c.backup, 0);
  const totalMaint = cds.reduce((s,c) => s + c.maint.length, 0);
  const totalBackupDisp = totalBackup - totalMaint;
  const el = document.getElementById('summary');
  el.innerHTML = '';
  [
    { v: totalNec, l: 'Veíc. necessários', cls: '' },
    { v: totalBackupDisp, l: 'Back up disponível', cls: totalBackupDisp < 0 ? 'maint' : '' }
  ].forEach(item => {
    const d = document.createElement('div');
    d.className = 'sum-card ' + item.cls;
    d.innerHTML = '<div class="val">' + item.v + '</div><div class="lbl">' + item.l + '</div>';
    el.appendChild(d);
  });
  document.getElementById('footer').textContent = 'Última atualização: ' + new Date().toLocaleString('pt-BR');
}

function renderCards() {
  const grid = document.getElementById('cards');
  grid.innerHTML = '';
  cds.forEach((cd, i) => {
    const bd = backupDisp(cd);
    const pct = dispPct(cd);
    const color = barColor(pct);
    const descoberto = bd < 0;
    const countCls = cd.maint.length === 0 ? 'maint-count zero' : 'maint-count';
    const countTxt = cd.maint.length === 0 ? 'OK' : cd.maint.length + ' veíc.';

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="card-head">
        <span class="cd-name">${cd.name}</span>
        <span class="cd-code">${cd.code}</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="v">${cd.necessarios}</div><div class="l">Necessários</div></div>
        <div class="stat"><div class="v">${cd.frota}</div><div class="l">Frota total</div></div>
        <div class="stat"><div class="v" id="bdisp-${i}" style="color:${color}">${bd}</div><div class="l">Back up livre</div></div>
      </div>
      <div class="backup-row">
        <div class="backup-meta">
          <span>${cd.backup} back ups — <span id="disp-${i}">${Math.max(0,bd)}</span> livres, <span id="emuso-${i}">${cd.maint.length}</span> em uso</span>
          <span id="pct-${i}" style="color:${color};font-weight:600">${descoberto ? 'DESCOBERTO' : pct + '%'}</span>
        </div>
        <div class="backup-bar"><div class="backup-fill" id="bar-${i}" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <div class="maint-box">
        <div class="maint-top">
          <span class="maint-label">Manutenção</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="${countCls}" id="cnt-${i}">${countTxt}</span>
            <button class="edit-btn" onclick="openEdit(${i})">editar</button>
          </div>
        </div>
        <div class="maint-view" id="view-${i}">${vehsHtml(cd.maint)}</div>
        <div class="maint-edit" id="edit-${i}">
          <textarea id="txt-${i}" placeholder="Um veículo por linha&#10;Ex: E - VUC / ABC1234">${cd.maint.join('\n')}</textarea>
          <br>
          <button class="save-btn" onclick="save(${i})">Salvar</button>
          <button class="cancel-btn" onclick="closeEdit(${i})">Cancelar</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openEdit(i) {
  document.getElementById('view-' + i).style.display = 'none';
  document.getElementById('edit-' + i).style.display = 'block';
  document.getElementById('txt-' + i).focus();
}

function closeEdit(i) {
  document.getElementById('view-' + i).style.display = '';
  document.getElementById('edit-' + i).style.display = 'none';
}

function save(i) {
  const raw = document.getElementById('txt-' + i).value.trim();
  cds[i].maint = raw ? raw.split('\n').map(s => s.trim()).filter(Boolean) : [];
  const bd = backupDisp(cds[i]);
  const pct = dispPct(cds[i]);
  const color = barColor(pct);
  const descoberto = bd < 0;
  document.getElementById('view-' + i).innerHTML = vehsHtml(cds[i].maint);
  const countEl = document.getElementById('cnt-' + i);
  countEl.className = cds[i].maint.length === 0 ? 'maint-count zero' : 'maint-count';
  countEl.textContent = cds[i].maint.length === 0 ? 'OK' : cds[i].maint.length + ' veíc.';
  document.getElementById('pct-' + i).textContent = descoberto ? 'DESCOBERTO' : pct + '%';
  document.getElementById('pct-' + i).style.color = color;
  document.getElementById('bar-' + i).style.width = pct + '%';
  document.getElementById('bar-' + i).style.background = color;
  document.getElementById('disp-' + i).textContent = Math.max(0, bd);
  document.getElementById('bdisp-' + i).textContent = bd;
  document.getElementById('bdisp-' + i).style.color = color;
  document.getElementById('emuso-' + i).textContent = cds[i].maint.length;
  closeEdit(i);
  renderSummary();
  dbSave(cds[i].code, cds[i].maint);
}

function renderRoutes() {
  const grid = document.getElementById('routes-grid');
  grid.innerHTML = '';
  routesByCd.forEach(cd => {
    const card = document.createElement('div');
    card.className = 'route-card';
    card.innerHTML = '<div class="route-card-title">' + cd.name + '</div>' +
      '<div class="route-card-sub">' + cd.rotas.length + ' rotas</div>' +
      cd.rotas.map(r => '<div class="route-item"><span class="route-name">' + r.nome + '</span><span class="route-detail">' + r.detalhe + '</span></div>').join('');
    grid.appendChild(card);
  });
}

function showPage(page) {
  document.getElementById('page-dashboard').classList.toggle('visible', page === 'dashboard');
  document.getElementById('page-routes').classList.toggle('visible', page === 'routes');
  document.getElementById('btn-dash').classList.toggle('active', page === 'dashboard');
  document.getElementById('btn-routes').classList.toggle('active', page === 'routes');
}

async function init() {
  await dbLoad();
  await loadFromLauto();
  renderSummary();
  renderCards();
  renderRoutes();
  setInterval(async () => {
    await dbLoad();
    await loadFromLauto();
    renderSummary();
    renderCards();
  }, 15000);
}

init();
